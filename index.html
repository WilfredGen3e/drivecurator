<!doctype html>
<html lang="%BRANDING_LANG%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="%BRANDING_DESCRIPTION%" />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="%BRANDING_OG_TITLE%" />
    <meta property="og:description" content="%BRANDING_OG_DESCRIPTION%" />
    <meta property="og:image" content="%BRANDING_OG_IMAGE%" />

    <!-- PWA / thema -->
    <meta name="theme-color" content="%BRANDING_THEME_COLOR%" />

    <!-- iOS: full-screen 'Zet op beginscherm' -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="%BRANDING_NAME%" />
    <link rel="apple-touch-icon" href="%BRANDING_APPLE_TOUCH_ICON%" />

    <title>%BRANDING_TITLE%</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
